<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽咪金句王</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary-red: #d35b5b; --bg-cream: #fdf8f1; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-cream); margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; }
        .step { display: none; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h2 { color: var(--primary-red); margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { background-color: var(--primary-red); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        .share-btn { background-color: #06C755 !important; }
        .next-btn { background-color: #f39c12 !important; display: none; }
        canvas { max-width: 100%; border-radius: 10px; margin-top: 15px; border: 1px solid #ddd; }
        #finalImg { max-width: 100%; border-radius: 10px; margin-top: 15px; display: none; border: 1px solid #ddd; }
        .instruction { font-size: 14px; color: #888; margin-top: 10px; }
        #hidden_iframe { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <h2>🌸 媽咪金句王 🌸</h2>
        <p>分享最常聽到的媽媽說的一句話</p>
        <textarea id="quoteInput_display" rows="3" placeholder="例如：甲飽沒?"></textarea>
        <button id="btn1" onclick="submitQuote()">送出金句，製作卡片</button>
    </div>

    <div id="step2" class="step">
        <h2>💖 愛在心裡難開口</h2>
        <input type="text" id="cardTitle" placeholder="標題 (例如: 老媽咪)" maxlength="10">
        <textarea id="cardContent" rows="3" placeholder="想說的話 (例如: 我愛您，辛苦了！)" maxlength="40"></textarea>
        <input type="text" id="cardSender" placeholder="您的姓名" maxlength="8">
        <button id="btnPreview" onclick="drawCard()">預覽並生成卡片</button>
        <canvas id="cardCanvas" style="display:none;"></canvas>
        <img id="finalImg" alt="卡片生成成功">
        <div id="saveInstruction" style="display:none;">
            <p class="instruction" style="color:#d35b5b; font-weight:bold;">🌸 點擊綠色按鈕分享卡片，抽獎鈕隨後出現</p>
            <button class="share-btn" id="btnShare" onclick="shareCardImage()">分享卡片圖檔</button>
            <button class="next-btn" id="btnNextStep" onclick="showStep(3)">完成分享！參加抽獎 🎁</button>
            <p id="longPressTip" class="instruction" style="display:none;">(若無法自動分享，請長按圖片傳送後點擊按鈕繼續)</p>
        </div>
    </div>

    <div id="step3" class="step">
        <h2>🎁 快來抽獎</h2>
        <input type="text" id="empId_display" placeholder="工號">
        <input type="text" id="dept_display" placeholder="部門">
        <input type="text" id="name_display" placeholder="姓名">
        <button id="btn3" onclick="submitRaffle()">完成抽獎報名</button>
    </div>
</div>

<form id="gasForm" action="" method="get" target="hidden_iframe" style="display:none;">
    <input type="hidden" name="action" id="form_action">
    <input type="hidden" name="quote" id="form_quote">
    <input type="hidden" name="empId" id="form_empId">
    <input type="hidden" name="dept" id="form_dept">
    <input type="hidden" name="name" id="form_name">
</form>
<iframe name="hidden_iframe" id="hidden_iframe"></iframe>

<script>
    // 🚩 這裡填入您剛才複製的最新 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxb6ZH2XrdWxYbQVFmbiNoDBWXVUq_rZV1KffVT5OkDQFjwQs9o3C3TqQpxiwxhrLQApg/exec"; 
    const CARD_TEMPLATE_URL = "2026mommy.jpg"; 
    const MY_LIFF_ID = "2009874827-0sg2wphM"; 

    window.onload = function() {
        liff.init({ liffId: MY_LIFF_ID }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); }
        });
    };

    function submitQuote() {
        const quote = document.getElementById('quoteInput_display').value;
        if (!quote) return alert("請輸入金句");
        document.getElementById('btn1').disabled = true;
        const form = document.getElementById('gasForm');
        form.action = GAS_URL;
        document.getElementById('form_action').value = "saveQuote";
        document.getElementById('form_quote').value = quote;
        form.submit();
        setTimeout(() => { showStep(2); }, 1500);
    }

    function drawCard() {
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = "anonymous"; 
        img.src = CARD_TEMPLATE_URL + "?v=" + new Date().getTime();
        img.onload = function() {
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            ctx.fillStyle = "#8e443d"; 
            
            // 標題位置
            ctx.font = "bold 55px Microsoft JhengHei"; 
            ctx.fillText(document.getElementById('cardTitle').value, 110, 180); 

            // 內容位置
            ctx.font = "38px Microsoft JhengHei";
            wrapText(ctx, document.getElementById('cardContent').value, 110, 310, 700, 55); 

            // 署名位置微調 (X 改為 840，讓名字出現在「愛您的」右邊)
            ctx.font = "bold 38px Microsoft JhengHei"; 
            ctx.fillText(document.getElementById('cardSender').value, 840, 888);
            
            const dataURL = canvas.toDataURL("image/jpeg", 0.9);
            const finalImg = document.getElementById('finalImg');
            finalImg.src = dataURL;
            finalImg.style.display = 'block';
            canvas.style.display = 'none';
            document.getElementById('saveInstruction').style.display = 'block';
            document.getElementById('btnPreview').style.display = 'none';
            window.scrollTo(0, document.body.scrollHeight);
        };
    }

    async function shareCardImage() {
        const canvas = document.getElementById('cardCanvas');
        try {
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
            const file = new File([blob], "mommy_card.jpg", { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '母親節卡片' });
                unlockNextStep();
            } else {
                unlockNextStep();
                document.getElementById('longPressTip').style.display = 'block';
            }
        } catch (e) { unlockNextStep(); }
    }

    function unlockNextStep() {
        document.getElementById('btnNextStep').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        var words = text.split(''); var line = '';
        for(var n = 0; n < words.length; n++) {
            var testLine = line + words[n];
            if (context.measureText(testLine).width > maxWidth && n > 0) {
                context.fillText(line, x, y); line = words[n]; y += lineHeight;
            } else { line = testLine; }
        }
        context.fillText(line, x, y);
    }

    function submitRaffle() {
        const empId = document.getElementById('empId_display').value;
        const dept = document.getElementById('dept_display').value;
        const name = document.getElementById('name_display').value;
        if(!empId || !name) return alert("請確認資料填寫完整");
        document.getElementById('btn3').disabled = true;
        const form = document.getElementById('gasForm');
        form.action = GAS_URL;
        document.getElementById('form_action').value = "saveRaffle";
        document.getElementById('form_empId').value = empId;
        document.getElementById('form_dept').value = dept;
        document.getElementById('form_name').value = name;
        form.submit();
        setTimeout(() => {
            alert("抽獎報名成功！祝您中獎！");
            document.getElementById('btn3').innerText = "報名完成";
        }, 1500);
    }

    function showStep(s) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
