<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽咪金句王</title>
    <style>
        :root { --primary-red: #d35b5b; --bg-cream: #fdf8f1; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-cream); margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center; }
        .step { display: none; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h2 { color: var(--primary-red); margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { background-color: var(--primary-red); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        canvas { max-width: 100%; border-radius: 10px; margin-top: 15px; border: 1px solid #ddd; }
        .instruction { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 步驟 1 -->
    <div id="step1" class="step active">
        <h2>🌸 媽咪金句王 🌸</h2>
        <p>分享最常聽到的媽媽說的一句話</p>
        <textarea id="quoteInput" rows="3" placeholder="例如：我這麼做是為你好"></textarea>
        <button id="btn1" onclick="submitQuote()">送出金句，製作卡片</button>
    </div>

    <!-- 步驟 2 -->
    <div id="step2" class="step">
        <h2>💖 愛在心裡難開口</h2>
        <input type="text" id="cardTitle" placeholder="標題（例如：給最親愛的媽）" maxlength="10">
        <textarea id="cardContent" rows="3" placeholder="內容（例如：母親節快樂，辛苦了！）" maxlength="40"></textarea>
        <input type="text" id="cardSender" placeholder="您的姓名" maxlength="8">
        <button onclick="drawCard()">預覽並生成卡片</button>
        <canvas id="cardCanvas" style="display:none;"></canvas>
        <div id="saveInstruction" style="display:none;">
            <p class="instruction">💡 長按圖片即可「儲存」或「傳送」</p>
            <button onclick="showStep(3)">下一步：參加抽獎</button>
        </div>
    </div>

    <!-- 步驟 3 -->
    <div id="step3" class="step">
        <h2>🎁 快來抽獎</h2>
        <input type="text" id="empId" placeholder="工號 (例如: 202600510)">
        <input type="text" id="dept" placeholder="部門">
        <input type="text" id="name" placeholder="姓名">
        <button id="btn3" onclick="submitRaffle()">完成抽獎報名</button>
    </div>
</div>

<script>
    // 🚩 修改這裡：請貼入您剛才部署得到的 URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxb6ZH2XrdWxYbQVFmbiNoDBWXVUq_rZV1KffVT5OkDQFjwQs9o3C3TqQpxiwxhrLQApg/exec"; 
    const CARD_TEMPLATE_URL = "2026mommy.jpg"; 

    // 送出金句
    async function submitQuote() {
        const quote = document.getElementById('quoteInput').value;
        if (!quote) return alert("請輸入內容");
        const btn = document.getElementById('btn1');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        // 改用 GET 方式傳送，避開連線錯誤
        fetch(`${GAS_URL}?action=saveQuote&quote=${encodeURIComponent(quote)}`, { mode: 'no-cors' })
        .then(() => {
            showStep(2);
        })
        .catch(() => {
            // no-cors 模式下可能會報錯但其實資料有送出，所以我們還是跳下一步
            showStep(2);
        });
    }

    // 畫卡片
    function drawCard() {
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = "anonymous"; 
        img.src = CARD_TEMPLATE_URL;
        img.onload = function() {
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            ctx.fillStyle = "#8e443d"; 
            ctx.font = "bold 55px Microsoft JhengHei";
            ctx.fillText(document.getElementById('cardTitle').value, 150, 230);
            ctx.font = "38px Microsoft JhengHei";
            wrapText(ctx, document.getElementById('cardContent').value, 150, 360, 650, 55);
            ctx.fillText(document.getElementById('cardSender').value, 740, 888);
            canvas.style.display = 'block';
            document.getElementById('saveInstruction').style.display = 'block';
        };
    }

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        var words = text.split(''); var line = '';
        for(var n = 0; n < words.length; n++) {
            var testLine = line + words[n];
            if (context.measureText(testLine).width > maxWidth && n > 0) {
                context.fillText(line, x, y); line = words[n]; y += lineHeight;
            } else { line = testLine; }
        }
        context.fillText(line, x, y);
    }

    // 送出抽獎
    async function submitRaffle() {
        const empId = document.getElementById('empId').value;
        const dept = document.getElementById('dept').value;
        const name = document.getElementById('name').value;
        if(!empId || !name) return alert("請填妥資料");
        const btn = document.getElementById('btn3');
        btn.disabled = true;
        
        const params = `action=saveRaffle&empId=${encodeURIComponent(empId)}&dept=${encodeURIComponent(dept)}&name=${encodeURIComponent(name)}`;
        fetch(`${GAS_URL}?${params}`, { mode: 'no-cors' })
        .then(() => {
            alert("完成活動！預祝您中獎！");
        });
    }

    function showStep(s) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
